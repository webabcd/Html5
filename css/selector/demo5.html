<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>伪元素（pseudo element）</title>
    <!-- 引用外部样式表
    <link rel="stylesheet" type="text/css" href="style.css" />
    -->
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        /*
            伪元素用于为类选择器添加特殊的效果
        */

        /* 选中的是 .div1 的第 1 个字符 */
        .div1:first-letter {
            text-transform: uppercase;
        }

        /* 选中的是 .div2 的第 1 行内容 */
        .div2:first-line {
            color: green;
        }

        /* 在 .div3 前插入红色的左引号（这个插入的字符串在页面上是无法选中的） */
        .div3:before {
            content: "“";
            color: red;
        }
        /* 在 .div3 后插入绿色的右引号（这个插入的字符串在页面上是无法选中的） */
        .div3:after {
            content: "”";
            color: green;
        }

        /* 在 .div4 后插入图片（无法设置图片的宽和高） */
        .div4:before {
            content: url("https://www.baidu.com/img/bd_logo1.png");
        }

        /*
            counter-reset - 重置指定的计数器
            counter-increment - 指定的计数器加 1
            counter - 获取指定的计数器的数值
        */
        p
        {
            counter-reset:counter1;
        }
        h1
        {
            counter-reset:counter2;
        }
        h1:after
        {
            counter-increment:counter1;
            content:"item " counter(counter1);
        }
        h2:after
        {
            counter-increment:counter2;
            content:"item " counter(counter1) "_" counter(counter2);
        }
    </style>
</head>
<body>

<div class="div1">webabcd</div>

<div class="div2">
    webabcd
    <br />
    webabcd
    <br />
    webabcd
</div>

<div class="div3">webabcd</div>

<div class="div4">webabcd</div>

<p>
    <h1></h1>
    <h2></h2>
    <h2></h2>
    <h2></h2>

    <h1></h1>
    <h2></h2>
    <h2></h2>

    <h1></h1>
    <h2></h2>
    <h2></h2>
</p>

</body>
</html>
